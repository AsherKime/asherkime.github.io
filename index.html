<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDR2 Completionist Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <h2>RDR2 Map</h2>
        
        <div class="filter-section">
            <h3>Categories</h3>
            <label>
                <input type="checkbox" class="filter-check" value="general_store" checked> 
                General Stores
            </label><br>
            <label>
                <input type="checkbox" class="filter-check" value="plant" checked> 
                Plants & Herbs
            </label><br>
            <label>
                <input type="checkbox" class="filter-check" value="treasure" checked> 
                Treasures
            </label>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
